        type: object
      - additionalProperties: false
        description: 'The final action of the receipt returned a promise or the signed transaction was converted

          to a receipt. Contains the receipt_id of the generated receipt.'
        properties:
          SuccessReceiptId:
            $ref: '#/components/schemas/CryptoHash'
        required:
        - SuccessReceiptId
        type: object
    TxExecutionStatus:
      oneOf:
      - description: Transaction is waiting to be included into the block
        enum:
        - NONE
        type: string
      - description: Transaction is included into the block. The block may be not finalized yet
        enum:
        - INCLUDED
        type: string
      - description: 'Transaction is included into the block +

          All non-refund transaction receipts finished their execution.

          The corresponding blocks for tx and each receipt may be not finalized yet'
        enum:
        - EXECUTED_OPTIMISTIC
        type: string
      - description: Transaction is included into finalized block
        enum:
        - INCLUDED_FINAL
        type: string
      - description: 'Transaction is included into finalized block +

          All non-refund transaction receipts finished their execution.

          The corresponding blocks for each receipt may be not finalized yet'
        enum:
        - EXECUTED
        type: string
      - description: 'Transaction is included into finalized block +

          Execution of all transaction receipts is finalized, including refund receipts'
        enum:
        - FINAL
        type: string
    GlobalContractIdentifierView:
      oneOf:
      - additionalProperties: false
        properties:
          hash:
            $ref: '#/components/schemas/CryptoHash'
        required:
        - hash
        type: object
      - additionalProperties: false
        properties:
          account_id:
            $ref: '#/components/schemas/AccountId'
        required:
        - account_id
        type: object
    FunctionArgs:
      description: 'This type is used to mark function arguments.


        NOTE: The main reason for this to exist (except the type-safety) is that the value is

        transparently serialized and deserialized as a base64-encoded string when serde is used

        (serde_json).'
      format: bytes
      type: string
    UseGlobalContractAction:
      description: Use global contract action
      properties:
        contract_identifier:
          $ref: '#/components/schemas/GlobalContractIdentifier'
      required:
      - contract_identifier
      type: object
    GlobalContractDeployMode:
      oneOf:
      - description: 'Contract is deployed under its code hash.

          Users will be able reference it by that hash.

          This effectively makes the contract immutable.'
        enum:
        - CodeHash
        type: string
      - description: 'Contract is deployed under the owner account id.

          Users will be able reference it by that account id.

          This allows the owner to update the contract for all its users.'
        enum:
        - AccountId
        type: string
    AccessKeyView:
      description: Describes access key permission scope and nonce.
      properties:
        nonce:
          format: uint64
          minimum: 0
          type: integer
        permission:
          $ref: '#/components/schemas/AccessKeyPermissionView'
      required:
      - nonce
      - permission
      type: object
    InvalidAccessKeyError:
      oneOf:
      - additionalProperties: false
        description: The access key identified by the `public_key` doesn't exist for the account
        properties:
          AccessKeyNotFound:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - account_id
            - public_key
            type: object
        required:
        - AccessKeyNotFound
        type: object
      - additionalProperties: false
        description: Transaction `receiver_id` doesn't match the access key receiver_id
        properties:
          ReceiverMismatch:
            properties:
              ak_receiver:
                type: string
              tx_receiver:
                $ref: '#/components/schemas/AccountId'
            required:
            - tx_receiver
            - ak_receiver
            type: object
        required:
        - ReceiverMismatch
        type: object
      - additionalProperties: false
        description: Transaction method name isn't allowed by the access key
        properties:
          MethodNameMismatch:
            properties:
              method_name:
                type: string
            required:
            - method_name
            type: object
        required:
        - MethodNameMismatch
        type: object
      - description: Transaction requires a full permission access key.
        enum:
        - RequiresFullAccess
        type: string
      - additionalProperties: false
        description: Access Key does not have enough allowance to cover transaction cost
        properties:
          NotEnoughAllowance:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              allowance:
                $ref: '#/components/schemas/NearToken'
              cost:
                $ref: '#/components/schemas/NearToken'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - account_id
            - public_key
            - allowance
            - cost
            type: object
        required:
        - NotEnoughAllowance
        type: object
      - description: Having a deposit with a function call action is not allowed with a function call access key.
        enum:
        - DepositWithFunctionCall
        type: string
      - description: 'Gas keys track nonces per index in dedicated storage, which a plain

          access key nonce does not select, so a gas key must sign a `DelegateV2`

          with a gas key nonce instead.'
        enum:
        - DelegateActionRequiresNonGasKey
        type: string
      - description: A delegate action with a gas key nonce must be signed by a gas key.
        enum:
        - DelegateActionRequiresGasKey
        type: string
    CostGasUsed:
      description: Shows gas profile. More info [here](https://near.github.io/nearcore/architecture/gas/gas_profile.html?highlight=WASM_HOST_COST#example-transaction-gas-profile).
      properties:
        cost:
          type: string
        cost_category:
          description: Either ACTION_COST or WASM_HOST_COST.
          type: string
        gas_used:
          type: string
      required:
      - cost_category
      - cost
      - gas_used
      type: object
    ShardId:
      description: 'The shard identifier. It may be an arbitrary number - it does not need to be

        a number in the range 0..NUM_SHARDS. The shard ids do not need to be

        sequential or contiguous.


        The shard id is wrapped in a new type to prevent the old pattern of using

        indices in range 0..NUM_SHARDS and casting to ShardId. Once the transition

        if fully complete it potentially may be simplified to a regular type alias.'
      format: uint64
      minimum: 0
      type: integer
    Direction:
      enum:
      - Left
      - Right
      type: string
    AccessKeyPermission:
      description: Defines permissions for AccessKey
      oneOf:
      - additionalProperties: false
        properties:
          FunctionCall:
            $ref: '#/components/schemas/FunctionCallPermission'
        required:
        - FunctionCall
        type: object
      - description: 'Grants full access to the account.

          NOTE: It''s used to replace account-level public keys.'
        enum:
        - FullAccess
        type: string
      - additionalProperties: false
        description: 'Gas key with limited permission to make transactions with FunctionCallActions

          Gas keys are a kind of access keys with a prepaid balance to pay for gas.'
        properties:
          GasKeyFunctionCall:
            items:
            - $ref: '#/components/schemas/GasKeyInfo'
            - $ref: '#/components/schemas/FunctionCallPermission'
            maxItems: 2
            minItems: 2
            type: array
        required:
        - GasKeyFunctionCall
        type: object
      - additionalProperties: false
        description: 'Gas key with full access to the account.

          Gas keys are a kind of access keys with a prepaid balance to pay for gas.'
        properties:
          GasKeyFullAccess:
            $ref: '#/components/schemas/GasKeyInfo'
        required:
        - GasKeyFullAccess
        type: object
    AccessKeyPermissionView:
      description: Describes the permission scope for an access key. Whether it is a function call or a full access key.
      oneOf:
      - enum:
        - FullAccess
        type: string
      - additionalProperties: false
        properties:
          FunctionCall:
            properties:
              allowance:
                anyOf:
                - $ref: '#/components/schemas/NearToken'
                - enum:
                  - null
                  nullable: true
              method_names:
                items:
                  type: string
                type: array
              receiver_id:
                type: string
            required:
            - receiver_id
            - method_names
            type: object
        required:
        - FunctionCall
        type: object
      - additionalProperties: false
        properties:
          GasKeyFunctionCall:
            properties:
              allowance:
                anyOf:
                - $ref: '#/components/schemas/NearToken'
                - enum:
                  - null
                  nullable: true
              balance:
                $ref: '#/components/schemas/NearToken'
              method_names:
                items:
                  type: string
                type: array
              num_nonces:
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
              receiver_id:
                type: string
            required:
            - balance
            - num_nonces
            - receiver_id
            - method_names
            type: object
        required:
        - GasKeyFunctionCall
        type: object
      - additionalProperties: false
        properties:
          GasKeyFullAccess:
            properties:
              balance:
                $ref: '#/components/schemas/NearToken'
              num_nonces:
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
            required:
            - balance
            - num_nonces
            type: object
        required:
        - GasKeyFullAccess
        type: object
    WithdrawFromGasKeyAction:
      description: 'Withdraw NEAR from a gas key''s balance to the account.


        This action must only be available via transactions, not via contract execution

        (there is no corresponding promise batch action host function).'
      properties:
        amount:
          allOf:
          - $ref: '#/components/schemas/NearToken'
          description: Amount of NEAR to transfer from the gas key
        public_key:
          allOf:
          - $ref: '#/components/schemas/PublicKey'
          description: The public key of the gas key to withdraw from
      required:
      - public_key
      - amount
      type: object
    SignedTransactionView:
      properties:
        actions:
          items:
            $ref: '#/components/schemas/ActionView'
          type: array
        hash:
          $ref: '#/components/schemas/CryptoHash'
        nonce:
          format: uint64
          minimum: 0
          type: integer
        nonce_index:
          format: uint16
          maximum: 65535
          minimum: 0
          nullable: true
          type: integer
        nonce_mode:
          anyOf:
          - $ref: '#/components/schemas/NonceMode'
          - enum:
            - null
            nullable: true
        priority_fee:
          default: 0
          description: Deprecated, retained for backward compatibility.
          format: uint64
          minimum: 0
          type: integer
        public_key:
          $ref: '#/components/schemas/PublicKey'
        receiver_id:
          $ref: '#/components/schemas/AccountId'
        signature:
          $ref: '#/components/schemas/Signature'
        signer_id:
          $ref: '#/components/schemas/AccountId'
      required:
      - signer_id
      - public_key
      - nonce
      - receiver_id
      - actions
      - signature
      - hash
      type: object
    ActionView:
      oneOf:
      - enum:
        - CreateAccount
        type: string
      - additionalProperties: false
        properties:
          DeployContract:
            properties:
              code:
                format: bytes
                type: string
            required:
            - code
            type: object
        required:
        - DeployContract
        type: object
      - additionalProperties: false
        properties:
          FunctionCall:
            properties:
              args:
                $ref: '#/components/schemas/FunctionArgs'
              deposit:
                $ref: '#/components/schemas/NearToken'
              gas:
                $ref: '#/components/schemas/NearGas'
              method_name:
                type: string
            required:
            - method_name
            - args
            - gas
            - deposit
            type: object
        required:
        - FunctionCall
        type: object
      - additionalProperties: false
        properties:
          Transfer:
            properties:
              deposit:
                $ref: '#/components/schemas/NearToken'
            required:
            - deposit
            type: object
        required:
        - Transfer
        type: object
      - additionalProperties: false
        properties:
          Stake:
            properties:
              public_key:
                $ref: '#/components/schemas/PublicKey'
              stake:
                $ref: '#/components/schemas/NearToken'
            required:
            - stake
            - public_key
            type: object
        required:
        - Stake
        type: object
      - additionalProperties: false
        properties:
          AddKey:
            properties:
              access_key:
                $ref: '#/components/schemas/AccessKeyView'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - public_key
            - access_key
            type: object
        required:
        - AddKey
        type: object
      - additionalProperties: false
        properties:
          DeleteKey:
            properties:
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - public_key
            type: object
        required:
        - DeleteKey
        type: object
      - additionalProperties: false
        properties:
          DeleteAccount:
            properties:
              beneficiary_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - beneficiary_id
            type: object
        required:
        - DeleteAccount
        type: object
      - additionalProperties: false
        properties:
          Delegate:
            properties:
              delegate_action:
                $ref: '#/components/schemas/DelegateAction'
              signature:
                $ref: '#/components/schemas/Signature'
            required:
            - delegate_action
            - signature
            type: object
        required:
        - Delegate
        type: object
      - additionalProperties: false
        properties:
          DelegateV2:
            properties:
              delegate_action:
                $ref: '#/components/schemas/VersionedDelegateActionPayload'
              signature:
                $ref: '#/components/schemas/Signature'
            required:
            - delegate_action
            - signature
            type: object
        required:
        - DelegateV2
        type: object
      - additionalProperties: false
        properties:
          DeployGlobalContract:
            properties:
              code:
                format: bytes
                type: string
            required:
            - code
            type: object
        required:
        - DeployGlobalContract
        type: object
      - additionalProperties: false
        properties:
          DeployGlobalContractByAccountId:
            properties:
              code:
                format: bytes
                type: string
            required:
            - code
            type: object
        required:
        - DeployGlobalContractByAccountId
        type: object
      - additionalProperties: false
        properties:
          UseGlobalContract:
            properties:
              code_hash:
                $ref: '#/components/schemas/CryptoHash'
            required:
            - code_hash
            type: object
        required:
        - UseGlobalContract
        type: object
      - additionalProperties: false
        properties:
          UseGlobalContractByAccountId:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - UseGlobalContractByAccountId
        type: object
      - additionalProperties: false
        properties:
          DeterministicStateInit:
            properties:
              code:
                $ref: '#/components/schemas/GlobalContractIdentifierView'
              data:
                additionalProperties:
                  type: string
                type: object
              deposit:
                $ref: '#/components/schemas/NearToken'
            required:
            - code
            - data
            - deposit
            type: object
        required:
        - DeterministicStateInit
        type: object
      - additionalProperties: false
        properties:
          TransferToGasKey:
            properties:
              deposit:
                $ref: '#/components/schemas/NearToken'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - public_key
            - deposit
            type: object
        required:
        - TransferToGasKey
        type: object
      - additionalProperties: false
        properties:
          WithdrawFromGasKey:
            properties:
              amount:
                $ref: '#/components/schemas/NearToken'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - public_key
            - amount
            type: object
        required:
        - WithdrawFromGasKey
        type: object
    RpcRequestValidationErrorKind:
      oneOf:
      - properties:
          info:
            properties:
              method_name:
                type: string
            required:
            - method_name
            type: object
          name:
            enum:
            - METHOD_NOT_FOUND
            type: string
        required:
        - name
        - info
        type: object
      - properties:
          info:
            properties:
              error_message:
                type: string
            required:
            - error_message
            type: object
          name:
            enum:
            - PARSE_ERROR
            type: string
        required:
        - name
        - info
        type: object
    DeterministicAccountStateInit:
      oneOf:
      - additionalProperties: false
        properties:
          V1:
            $ref: '#/components/schemas/DeterministicAccountStateInitV1'
        required:
        - V1
        type: object
    ReceiptView:
      properties:
        predecessor_id:
          $ref: '#/components/schemas/AccountId'
        priority:
          default: 0
          description: Deprecated, retained for backward compatibility.
          format: uint64
          minimum: 0
          type: integer
        receipt:
          $ref: '#/components/schemas/ReceiptEnumView'
        receipt_id:
          $ref: '#/components/schemas/CryptoHash'
        receiver_id:
          $ref: '#/components/schemas/AccountId'
      required:
      - predecessor_id
      - receiver_id
      - receipt_id
      - receipt
      type: object
    GlobalContractIdentifier:
      oneOf:
      - additionalProperties: false
        properties:
          hash:
            $ref: '#/components/schemas/CryptoHash'
        required:
        - hash
        type: object
      - additionalProperties: false
        properties:
          account_id:
            $ref: '#/components/schemas/AccountId'
        required:
        - account_id
        type: object
