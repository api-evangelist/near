        properties:
          NewReceiptValidationError:
            $ref: '#/components/schemas/ReceiptValidationError'
        required:
        - NewReceiptValidationError
        type: object
      - additionalProperties: false
        description: 'Error occurs when a `CreateAccount` action is called on a NEAR-implicit or ETH-implicit account.

          See NEAR-implicit account creation NEP: <https://github.com/nearprotocol/NEPs/pull/71>.

          Also, see ETH-implicit account creation NEP: <https://github.com/near/NEPs/issues/518>.


          TODO(#8598): This error is named very poorly. A better name would be

          `OnlyNamedAccountCreationAllowed`.'
        properties:
          OnlyImplicitAccountCreationAllowed:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - OnlyImplicitAccountCreationAllowed
        type: object
      - additionalProperties: false
        description: Delete account whose state is large is temporarily banned.
        properties:
          DeleteAccountWithLargeState:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - DeleteAccountWithLargeState
        type: object
      - description: Signature does not match the provided actions and given signer public key.
        enum:
        - DelegateActionInvalidSignature
        type: string
      - additionalProperties: false
        description: Receiver of the transaction doesn't match Sender of the delegate action
        properties:
          DelegateActionSenderDoesNotMatchTxReceiver:
            properties:
              receiver_id:
                $ref: '#/components/schemas/AccountId'
              sender_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - sender_id
            - receiver_id
            type: object
        required:
        - DelegateActionSenderDoesNotMatchTxReceiver
        type: object
      - description: Delegate action has expired. `max_block_height` is less than actual block height.
        enum:
        - DelegateActionExpired
        type: string
      - additionalProperties: false
        description: The given public key doesn't exist for Sender account
        properties:
          DelegateActionAccessKeyError:
            $ref: '#/components/schemas/InvalidAccessKeyError'
        required:
        - DelegateActionAccessKeyError
        type: object
      - additionalProperties: false
        description: DelegateAction nonce must be greater sender[public_key].nonce
        properties:
          DelegateActionInvalidNonce:
            properties:
              ak_nonce:
                format: uint64
                minimum: 0
                type: integer
              delegate_nonce:
                format: uint64
                minimum: 0
                type: integer
            required:
            - delegate_nonce
            - ak_nonce
            type: object
        required:
        - DelegateActionInvalidNonce
        type: object
      - additionalProperties: false
        description: DelegateAction nonce is larger than the upper bound given by the block height
        properties:
          DelegateActionNonceTooLarge:
            properties:
              delegate_nonce:
                format: uint64
                minimum: 0
                type: integer
              upper_bound:
                format: uint64
                minimum: 0
                type: integer
            required:
            - delegate_nonce
            - upper_bound
            type: object
        required:
        - DelegateActionNonceTooLarge
        type: object
      - additionalProperties: false
        properties:
          GlobalContractDoesNotExist:
            properties:
              identifier:
                $ref: '#/components/schemas/GlobalContractIdentifier'
            required:
            - identifier
            type: object
        required:
        - GlobalContractDoesNotExist
        type: object
      - additionalProperties: false
        description: Gas key does not exist for the specified public key
        properties:
          GasKeyDoesNotExist:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - account_id
            - public_key
            type: object
        required:
        - GasKeyDoesNotExist
        type: object
      - additionalProperties: false
        description: Gas key does not have sufficient balance for the requested withdrawal
        properties:
          InsufficientGasKeyBalance:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              balance:
                $ref: '#/components/schemas/NearToken'
              public_key:
                $ref: '#/components/schemas/PublicKey'
              required:
                $ref: '#/components/schemas/NearToken'
            required:
            - account_id
            - public_key
            - balance
            - required
            type: object
        required:
        - InsufficientGasKeyBalance
        type: object
      - additionalProperties: false
        description: Gas key balance is too high to burn during deletion
        properties:
          GasKeyBalanceTooHigh:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              balance:
                $ref: '#/components/schemas/NearToken'
              public_key:
                anyOf:
                - $ref: '#/components/schemas/PublicKey'
                - enum:
                  - null
                  nullable: true
                description: Set for DeleteKey (specific key), None for DeleteAccount (aggregate)
            required:
            - account_id
            - balance
            type: object
        required:
        - GasKeyBalanceTooHigh
        type: object
      - additionalProperties: false
        description: DelegateAction nonce index is outside the gas key's nonce range
        properties:
          DelegateActionInvalidNonceIndex:
            properties:
              nonce_index:
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
              num_nonces:
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
            required:
            - nonce_index
            - num_nonces
            type: object
        required:
        - DelegateActionInvalidNonceIndex
        type: object
    CompilationError:
      oneOf:
      - additionalProperties: false
        properties:
          CodeDoesNotExist:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - CodeDoesNotExist
        type: object
      - additionalProperties: false
        properties:
          PrepareError:
            $ref: '#/components/schemas/PrepareError'
        required:
        - PrepareError
        type: object
      - additionalProperties: false
        description: 'This is for defense in depth.

          We expect our runtime-independent preparation code to fully catch all invalid wasms,

          but, if it ever misses something we’ll emit this error'
        properties:
          WasmerCompileError:
            properties:
              msg:
                type: string
            required:
            - msg
            type: object
        required:
        - WasmerCompileError
        type: object
    PrepareError:
      description: Error that can occur while preparing or executing Wasm smart-contract.
      oneOf:
      - description: Error happened while serializing the module.
        enum:
        - Serialization
        type: string
      - description: Error happened while deserializing the module.
        enum:
        - Deserialization
        type: string
      - description: Internal memory declaration has been found in the module.
        enum:
        - InternalMemoryDeclared
        type: string
      - description: 'Gas instrumentation failed.


          This most likely indicates the module isn''t valid.'
        enum:
        - GasInstrumentation
        type: string
      - description: 'Stack instrumentation failed.


          This  most likely indicates the module isn''t valid.'
        enum:
        - StackHeightInstrumentation
        type: string
      - description: 'Error happened during instantiation.


          This might indicate that `start` function trapped, or module isn''t

          instantiable and/or un-linkable.'
        enum:
        - Instantiate
        type: string
      - description: Error creating memory.
        enum:
        - Memory
        type: string
      - description: Contract contains too many functions.
        enum:
        - TooManyFunctions
        type: string
      - description: Contract contains too many locals.
        enum:
        - TooManyLocals
        type: string
      - description: Contract contains too many tables.
        enum:
        - TooManyTables
        type: string
      - description: Contract contains too many table elements.
        enum:
        - TooManyTableElements
        type: string
      - description: A function body in the contract exceeds the size limit.
        enum:
        - FunctionBodyTooLarge
        type: string
      - description: The instrumented code exceeds the size limit.
        enum:
        - InstrumentedCodeTooLarge
        type: string
      - description: A function contains too many basic blocks.
        enum:
        - TooManyBlocksPerFunction
        type: string
      - description: A contract contains too many basic blocks.
        enum:
        - TooManyBlocksPerContract
        type: string
      - description: Contract declares too many entries in the wasm type section.
        enum:
        - TooManyTypes
        type: string
      - description: All contract functions combined have more than `max_params_per_contract` parameters.
        enum:
        - TooManyParamsPerFunction
        type: string
      - description: A function has more than `max_params_per_function` parameters.
        enum:
        - TooManyParamsPerContract
        type: string
      - description: 'A function''s max operand-stack size (in bytes) exceeds

          `max_operand_stack_bytes_per_function`.'
        enum:
        - OperandStackTooLarge
        type: string
    FinalExecutionOutcomeView:
      description: 'Execution outcome of the transaction and all the subsequent receipts.

        Could be not finalized yet'
      properties:
        receipts_outcome:
          description: The execution outcome of receipts.
          items:
            $ref: '#/components/schemas/ExecutionOutcomeWithIdView'
          type: array
        status:
          allOf:
          - $ref: '#/components/schemas/FinalExecutionStatus'
          description: 'Execution status defined by chain.rs:get_final_transaction_result

            FinalExecutionStatus::NotStarted - the tx is not converted to the receipt yet

            FinalExecutionStatus::Started - we have at least 1 receipt, but the first leaf receipt_id (using dfs) hasn''t finished the execution

            FinalExecutionStatus::Failure - the result of the first leaf receipt_id

            FinalExecutionStatus::SuccessValue - the result of the first leaf receipt_id'
        transaction:
          allOf:
          - $ref: '#/components/schemas/SignedTransactionView'
          description: Signed Transaction
        transaction_outcome:
          allOf:
          - $ref: '#/components/schemas/ExecutionOutcomeWithIdView'
          description: The execution outcome of the signed transaction.
      required:
      - status
      - transaction
      - transaction_outcome
      - receipts_outcome
      type: object
    StorageError:
      description: 'Errors which may occur during working with trie storages, storing

        trie values (trie nodes and state values) by their hashes.'
      oneOf:
      - description: Key-value db internal failure
        enum:
        - StorageInternalError
        type: string
      - additionalProperties: false
        description: Requested trie value by its hash which is missing in storage.
        properties:
          MissingTrieValue:
            $ref: '#/components/schemas/MissingTrieValue'
        required:
        - MissingTrieValue
        type: object
      - description: 'Found trie node which shouldn''t be part of state. Raised during

          validation of state sync parts where incorrect node was passed.

          TODO (#8997): consider including hash of trie node.'
        enum:
        - UnexpectedTrieValue
        type: string
      - additionalProperties: false
        description: 'Either invalid state or key-value db is corrupted.

          For PartialStorage it cannot be corrupted.

          Error message is unreliable and for debugging purposes only. It''s also probably ok to

          panic in every place that produces this error.

          We can check if db is corrupted by verifying everything in the state trie.'
        properties:
          StorageInconsistentState:
            type: string
        required:
        - StorageInconsistentState
        type: object
      - additionalProperties: false
        description: 'Flat storage error, meaning that it doesn''t support some block anymore.

          We guarantee that such block cannot become final, thus block processing

          must resume normally.'
        properties:
          FlatStorageBlockNotSupported:
            type: string
        required:
        - FlatStorageBlockNotSupported
        type: object
      - additionalProperties: false
        description: In-memory trie could not be loaded for some reason.
        properties:
          MemTrieLoadingError:
            type: string
        required:
        - MemTrieLoadingError
        type: object
    TransferAction:
      properties:
        deposit:
          $ref: '#/components/schemas/NearToken'
      required:
      - deposit
      type: object
    FinalExecutionOutcomeWithReceiptView:
