    AccountContractView:
      description: 'RPC view of a non-empty [`AccountContract`]. The `AccountContract::None`

        variant is represented externally as a JSON `null` via `Option`, so this

        enum only carries the three "contract is present" cases. Serializes as

        an externally-tagged object:


        - `Local(hash)` → `{"local": "<CryptoHash>"}`

        - `GlobalHash(hash)` → `{"global_hash": "<CryptoHash>"}`

        - `GlobalAccountId(id)` → `{"global_account_id": "<AccountId>"}`


        Mirrors [`AccountContract`] 1:1 (minus `None`) so consumers can preserve

        the distinction between a global-by-hash and global-by-account contract

        without descending into a nested identifier.'
      oneOf:
      - additionalProperties: false
        properties:
          local:
            $ref: '#/components/schemas/CryptoHash'
        required:
        - local
        type: object
      - additionalProperties: false
        properties:
          global_hash:
            $ref: '#/components/schemas/CryptoHash'
        required:
        - global_hash
        type: object
      - additionalProperties: false
        properties:
          global_account_id:
            $ref: '#/components/schemas/AccountId'
        required:
        - global_account_id
        type: object
    ActionError:
      description: An error happened during Action execution
      properties:
        index:
          description: 'Index of the failed action in the transaction.

            Action index is not defined if ActionError.kind is `ActionErrorKind::LackBalanceForState`'
          format: uint64
          minimum: 0
          nullable: true
          type: integer
        kind:
          allOf:
          - $ref: '#/components/schemas/ActionErrorKind'
          description: The kind of ActionError happened
      required:
      - kind
      type: object
    MethodResolveError:
      enum:
      - MethodEmptyName
      - MethodNotFound
      - MethodInvalidSignature
      type: string
    RpcRequestValidationErrorKind:
      oneOf:
      - properties:
          info:
            properties:
              method_name:
                type: string
            required:
            - method_name
            type: object
          name:
            enum:
            - METHOD_NOT_FOUND
            type: string
        required:
        - name
        - info
        type: object
      - properties:
          info:
            properties:
              error_message:
                type: string
            required:
            - error_message
            type: object
          name:
            enum:
            - PARSE_ERROR
            type: string
        required:
        - name
        - info
        type: object
    ActionErrorKind:
      oneOf:
      - additionalProperties: false
        description: Happens when CreateAccount action tries to create an account with account_id which is already exists in the storage
        properties:
          AccountAlreadyExists:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - AccountAlreadyExists
        type: object
      - additionalProperties: false
        description: Happens when TX receiver_id doesn't exist (but action is not Action::CreateAccount)
        properties:
          AccountDoesNotExist:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - AccountDoesNotExist
        type: object
      - additionalProperties: false
        description: A top-level account ID can only be created by registrar.
        properties:
          CreateAccountOnlyByRegistrar:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              predecessor_id:
                $ref: '#/components/schemas/AccountId'
              registrar_account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            - registrar_account_id
            - predecessor_id
            type: object
        required:
        - CreateAccountOnlyByRegistrar
        type: object
      - additionalProperties: false
        description: A newly created account must be under a namespace of the creator account
        properties:
          CreateAccountNotAllowed:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              predecessor_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            - predecessor_id
            type: object
        required:
        - CreateAccountNotAllowed
        type: object
      - additionalProperties: false
        description: 'Administrative actions like `DeployContract`, `Stake`, `AddKey`, `DeleteKey`. can be proceed only if sender=receiver

          or the first TX action is a `CreateAccount` action'
        properties:
          ActorNoPermission:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              actor_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            - actor_id
            type: object
        required:
        - ActorNoPermission
        type: object
      - additionalProperties: false
        description: Account tries to remove an access key that doesn't exist
        properties:
          DeleteKeyDoesNotExist:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - account_id
            - public_key
            type: object
        required:
        - DeleteKeyDoesNotExist
        type: object
      - additionalProperties: false
        description: The public key is already used for an existing access key
        properties:
          AddKeyAlreadyExists:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - account_id
            - public_key
            type: object
        required:
        - AddKeyAlreadyExists
        type: object
      - additionalProperties: false
        description: Account is staking and can not be deleted
        properties:
          DeleteAccountStaking:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - DeleteAccountStaking
        type: object
      - additionalProperties: false
        description: ActionReceipt can't be completed, because the remaining balance will not be enough to cover storage.
        properties:
          LackBalanceForState:
            properties:
              account_id:
                allOf:
                - $ref: '#/components/schemas/AccountId'
                description: An account which needs balance
              amount:
                allOf:
                - $ref: '#/components/schemas/NearToken'
                description: Balance required to complete an action.
            required:
            - account_id
            - amount
            type: object
        required:
        - LackBalanceForState
        type: object
      - additionalProperties: false
        description: Account is not yet staked, but tries to unstake
        properties:
          TriesToUnstake:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - TriesToUnstake
        type: object
      - additionalProperties: false
        description: The account doesn't have enough balance to increase the stake.
        properties:
          TriesToStake:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              balance:
                $ref: '#/components/schemas/NearToken'
              locked:
                $ref: '#/components/schemas/NearToken'
              stake:
                $ref: '#/components/schemas/NearToken'
            required:
            - account_id
            - stake
            - locked
            - balance
            type: object
        required:
        - TriesToStake
        type: object
      - additionalProperties: false
        properties:
          InsufficientStake:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              minimum_stake:
                $ref: '#/components/schemas/NearToken'
              stake:
                $ref: '#/components/schemas/NearToken'
            required:
            - account_id
            - stake
            - minimum_stake
            type: object
        required:
        - InsufficientStake
        type: object
      - additionalProperties: false
        description: An error occurred during a `FunctionCall` Action, parameter is debug message.
        properties:
          FunctionCallError:
            $ref: '#/components/schemas/FunctionCallError'
        required:
        - FunctionCallError
        type: object
      - additionalProperties: false
        description: 'Error occurs when a new `ActionReceipt` created by the `FunctionCall` action fails

          receipt validation.'
        properties:
          NewReceiptValidationError:
            $ref: '#/components/schemas/ReceiptValidationError'
        required:
        - NewReceiptValidationError
        type: object
      - additionalProperties: false
        description: 'Error occurs when a `CreateAccount` action is called on a NEAR-implicit or ETH-implicit account.

          See NEAR-implicit account creation NEP: <https://github.com/nearprotocol/NEPs/pull/71>.

          Also, see ETH-implicit account creation NEP: <https://github.com/near/NEPs/issues/518>.


          TODO(#8598): This error is named very poorly. A better name would be

          `OnlyNamedAccountCreationAllowed`.'
        properties:
          OnlyImplicitAccountCreationAllowed:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - OnlyImplicitAccountCreationAllowed
        type: object
      - additionalProperties: false
        description: Delete account whose state is large is temporarily banned.
        properties:
          DeleteAccountWithLargeState:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - account_id
            type: object
        required:
        - DeleteAccountWithLargeState
        type: object
      - description: Signature does not match the provided actions and given signer public key.
        enum:
        - DelegateActionInvalidSignature
        type: string
      - additionalProperties: false
        description: Receiver of the transaction doesn't match Sender of the delegate action
        properties:
          DelegateActionSenderDoesNotMatchTxReceiver:
            properties:
              receiver_id:
                $ref: '#/components/schemas/AccountId'
              sender_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - sender_id
            - receiver_id
            type: object
        required:
        - DelegateActionSenderDoesNotMatchTxReceiver
        type: object
      - description: Delegate action has expired. `max_block_height` is less than actual block height.
        enum:
        - DelegateActionExpired
        type: string
      - additionalProperties: false
        description: The given public key doesn't exist for Sender account
        properties:
          DelegateActionAccessKeyError:
            $ref: '#/components/schemas/InvalidAccessKeyError'
        required:
        - DelegateActionAccessKeyError
        type: object
      - additionalProperties: false
        description: DelegateAction nonce must be greater sender[public_key].nonce
        properties:
          DelegateActionInvalidNonce:
            properties:
              ak_nonce:
                format: uint64
                minimum: 0
                type: integer
              delegate_nonce:
                format: uint64
                minimum: 0
                type: integer
            required:
            - delegate_nonce
            - ak_nonce
            type: object
        required:
        - DelegateActionInvalidNonce
        type: object
      - additionalProperties: false
        description: DelegateAction nonce is larger than the upper bound given by the block height
        properties:
          DelegateActionNonceTooLarge:
            properties:
              delegate_nonce:
                format: uint64
                minimum: 0
                type: integer
              upper_bound:
                format: uint64
                minimum: 0
                type: integer
            required:
            - delegate_nonce
            - upper_bound
            type: object
        required:
        - DelegateActionNonceTooLarge
        type: object
      - additionalProperties: false
        properties:
          GlobalContractDoesNotExist:
            properties:
              identifier:
                $ref: '#/components/schemas/GlobalContractIdentifier'
            required:
            - identifier
            type: object
        required:
        - GlobalContractDoesNotExist
        type: object
      - additionalProperties: false
        description: Gas key does not exist for the specified public key
        properties:
          GasKeyDoesNotExist:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              public_key:
                $ref: '#/components/schemas/PublicKey'
            required:
            - account_id
            - public_key
            type: object
        required:
        - GasKeyDoesNotExist
        type: object
      - additionalProperties: false
        description: Gas key does not have sufficient balance for the requested withdrawal
        properties:
          InsufficientGasKeyBalance:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              balance:
                $ref: '#/components/schemas/NearToken'
              public_key:
                $ref: '#/components/schemas/PublicKey'
              required:
                $ref: '#/components/schemas/NearToken'
            required:
            - account_id
            - public_key
            - balance
            - required
            type: object
        required:
        - InsufficientGasKeyBalance
        type: object
      - additionalProperties: false
        description: Gas key balance is too high to burn during deletion
        properties:
          GasKeyBalanceTooHigh:
            properties:
              account_id:
                $ref: '#/components/schemas/AccountId'
              balance:
                $ref: '#/components/schemas/NearToken'
              public_key:
                anyOf:
                - $ref: '#/components/schemas/PublicKey'
                - enum:
                  - null
                  nullable: true
                description: Set for DeleteKey (specific key), None for DeleteAccount (aggregate)
            required:
            - account_id
            - balance
            type: object
        required:
        - GasKeyBalanceTooHigh
        type: object
      - additionalProperties: false
        description: DelegateAction nonce index is outside the gas key's nonce range
        properties:
          DelegateActionInvalidNonceIndex:
            properties:
              nonce_index:
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
              num_nonces:
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
            required:
            - nonce_index
            - num_nonces
            type: object
        required:
        - DelegateActionInvalidNonceIndex
        type: object
