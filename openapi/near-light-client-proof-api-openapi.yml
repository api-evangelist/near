      - additionalProperties: false
        description: Account does not have enough balance to cover TX cost
        properties:
          NotEnoughBalance:
            properties:
              balance:
                $ref: '#/components/schemas/NearToken'
              cost:
                $ref: '#/components/schemas/NearToken'
