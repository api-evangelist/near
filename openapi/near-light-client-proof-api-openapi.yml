                $ref: '#/components/schemas/DepositCostFailureReason'
              signer_id:
                $ref: '#/components/schemas/AccountId'
            required:
            - signer_id
            - balance
            - cost
            - reason
            type: object
        required:
        - NotEnoughBalanceForDeposit
        type: object
    ActionsValidationError:
