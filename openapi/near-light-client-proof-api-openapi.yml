              size:
                format: uint64
                minimum: 0
                type: integer
            required:
            - size
            - limit
            type: object
        required:
        - TransactionSizeExceeded
        type: object
      - description: Transaction version is invalid.
        enum:
        - InvalidTransactionVersion
        type: string
      - additionalProperties: false
        properties:
          StorageError:
            $ref: '#/components/schemas/StorageError'
        required:
        - StorageError
        type: object
      - additionalProperties: false
        description: 'The receiver shard of the transaction is too congested to accept new

          transactions at the moment.'
        properties:
          ShardCongested:
            properties:
              congestion_level:
                description: A value between 0 (no congestion) and 1 (max congestion).
                format: double
                type: number
              shard_id:
                description: The congested shard.
                format: uint32
                minimum: 0
                type: integer
            required:
            - shard_id
            - congestion_level
            type: object
        required:
        - ShardCongested
        type: object
      - additionalProperties: false
        description: 'The receiver shard of the transaction missed several chunks and rejects

          new transaction until it can make progress again.'
        properties:
          ShardStuck:
            properties:
              missed_chunks:
                description: The number of blocks since the last included chunk of the shard.
                format: uint64
                minimum: 0
                type: integer
              shard_id:
                description: The shard that fails making progress.
                format: uint32
                minimum: 0
                type: integer
            required:
            - shard_id
            - missed_chunks
            type: object
        required:
        - ShardStuck
        type: object
      - additionalProperties: false
        description: 'Transaction is specifying an invalid nonce index. Gas key transactions

          must have a nonce_index in valid range, regular transactions must not.'
        properties:
          InvalidNonceIndex:
            properties:
              num_nonces:
                description: Number of nonces supported by the key. 0 means no nonce_index allowed (regular key).
                format: uint16
                maximum: 65535
                minimum: 0
                type: integer
              tx_nonce_index:
