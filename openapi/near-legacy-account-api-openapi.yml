openapi: 3.0.3
info:
  description: Low-latency indexed account, token, and public-key lookup APIs for wallets and explorers. Embedded portal clients may forward an optional `apiKey` query parameter, but the public FastNEAR API does not require it.
  title: FastNEAR accounts Legacy / Account API
  version: 3.0.3
servers:
- description: Mainnet
  url: https://api.fastnear.com
- description: Testnet
  url: https://test.api.fastnear.com
tags:
- description: Deprecated.
  name: Legacy / Account
paths:
  /v1/account/{account}:
    get:
      summary: Get account info
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      responses:
        '200':
          description: Success response
  /v1/account/{account}/contract:
    get:
      summary: Get contract info
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      responses:
        '200':
          description: Success response
  /v1/account/{account}/contract/deployments:
    get:
      summary: Get contract deployment records (first & last)
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      responses:
        '200':
          description: Success response
  /v1/account/{account}/contract/parse:
    get:
      summary: Get parsed contract info
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      responses:
        '200':
          description: Success response
  /v1/account/{account}/contract/{method}:
    get:
      summary: Get latest action args for contract method
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      - in: path
        name: method
        required: true
        description: Method name
        schema:
          type: string
        examples:
          method:
            value: example-method
      responses:
        '200':
          description: Success response
  /v1/account/{account}/inventory:
    get:
      summary: Get account ft/nft token inventory
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      responses:
        '200':
          description: Success response
  /v1/account/{account}/tokens:
    get:
      summary: Get possible ft/nft token contracts
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      responses:
        '200':
          description: Success response
  /v1/account/{account}/keys:
    get:
      summary: Get access keys by pagination
      tags:
      - Legacy / Account
      parameters:
      - in: path
        name: account
        required: true
        description: Account ID
        schema:
          type: string
        examples:
          account:
            value: example-account-id
      - in: query
        name: page
        description: Page number
        schema:
          type: number
          minimum: 1
          maximum: 200
          default: 1
      - in: query
        name: per_page
        description: Number of items per page. Each increment of 25 will count towards rate limit. For example, per page 50 will use 2 credits.
        schema:
          type: number
          minimum: 1
          maximum: 250
          default: 25
      - in: query
        name: order
        description: Sort order
        schema:
          type: string
          enum:
          - desc
          - asc
          default: desc
      responses:
        '200':
          description: Success response
  /v1/account/{account}/keys/count:
    get:
